<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TikTok OAuth Callback</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;background:#0f0f10;color:#eee;margin:0;padding:2rem;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{max-width:640px;width:100%;background:#1b1b1e;border:1px solid #333;border-radius:14px;padding:1.6rem}
  h1{font-size:1.1rem;margin:0 0 1rem}
  .code{font-family:ui-monospace,Consolas,monospace;font-size:1rem;word-break:break-all;background:#000;border:1px solid #444;border-radius:8px;padding:1rem;color:#4ade80}
  button{margin-top:1rem;background:#e11d48;color:#fff;border:0;border-radius:8px;padding:.7rem 1.2rem;font-size:1rem;cursor:pointer}
  .muted{color:#888;font-size:.8rem;margin-top:1rem;word-break:break-all}
  .err{color:#f87171}
</style>
</head>
<body>
<div class="card">
  <h1>TikTok OAuth Callback</h1>
  <div id="out">Lese Code aus der URL...</div>
</div>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code');
  var err = p.get('error');
  var out = document.getElementById('out');
  if (err) {
    out.innerHTML = '<p class="err">Fehler: ' + err + ' - ' + (p.get('error_description')||'') + '</p>';
  } else if (code) {
    out.innerHTML =
      '<p>Dein Authorization-Code (kopieren und ins Skript einfuegen):</p>' +
      '<div class="code" id="c">' + code + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'c\').innerText).then(function(){this.innerText=\'Kopiert!\'}.bind(this))">Code kopieren</button>' +
      '<p class="muted">Volle URL: ' + location.href + '</p>';
  } else {
    out.innerHTML = '<p class="muted">Kein code in der URL. Diese Seite ist die Redirect-Landeseite fuer den TikTok-Login.</p>';
  }
</script>
</body>
</html>
